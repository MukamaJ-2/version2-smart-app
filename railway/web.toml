# =============================================================================
# UniGuard — Web app (Vite + React)
# =============================================================================
# Railway: add a second service, same repo, then:
#   Settings → Root directory: frontend
#   Settings → Config file: /railway/web.toml
#
# Variables (mark available at BUILD for all VITE_*):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   VITE_AI_API_URL   = https://<your-api-service>.up.railway.app  (no trailing slash)
#   VITE_GEMINI_API_KEY  (optional)
#
# Redeploy after changing any VITE_* value (they are baked in at build time).
# =============================================================================

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
