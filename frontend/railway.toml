# Web (Vite) — use with Service "Root directory" = frontend
# If Railway asks for a config path, use: /frontend/railway.toml
# If there is NO config path field: set Build + Start commands manually (see comments below).
#
# Auth + API: Railway → Variables on THIS service — add:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (from Supabase → Project Settings → API)
#   VITE_AI_API_URL = your Flask API URL (no trailing slash)
# Enable "Available at Build Time" for every VITE_* (Vite embeds them at npm run build).
# Redeploy after saving so the build picks them up.

[build]
builder = "NIXPACKS"
# Install phase already runs `npm ci`; only compile here (avoids duplicate npm ci).
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300

# Manual setup (same as this file) if you cannot find "Config file" in the UI:
#   Source → Root Directory: frontend
#   Build → Build command: npm run build  (after Nixpacks install)
#   Deploy → Start command: npm run start
# Variables → add VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_AI_API_URL (enable for build if offered)
